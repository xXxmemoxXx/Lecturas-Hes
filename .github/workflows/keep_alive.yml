name: Despierta Streamlit

on:
  schedule:
    # Se ejecuta cada hora en el minuto 5 (05 * * * *)
    # Esto es más efectivo que cada 4 horas para evitar el modo "Sleep"
    - cron: '5 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping App with Cache Busting
        run: |
          # Generamos un timestamp para que la URL sea única en cada petición
          TIMESTAMP=$(date +%s)
          URL="https://lecturas-hes.streamlit.app/?nocache=$TIMESTAMP"
          
          echo "Enviando ping a: $URL"
          
          # Realizamos la petición simulando un navegador Chrome en Windows
          # -L sigue redirecciones
          # -I solo pide los encabezados para ahorrar ancho de banda
          # -H añade el User-Agent
          STATUS=$(curl -L -I -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "$URL")
          
          echo "La aplicación respondió con el código: $STATUS"
          
          if [ "$STATUS" -eq "200" ] || [ "$STATUS" -eq "302" ]; then
            echo "✅ Ping enviado con éxito. La app está activa."
          else
            echo "⚠️ Advertencia: Código de respuesta inesperado ($STATUS)."
          fi
