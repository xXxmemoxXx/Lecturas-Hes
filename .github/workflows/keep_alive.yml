name: Despierta Streamlit

on:
  schedule:
    # Se ejecuta cada hora en el minuto 5 (05 * * * *)
    # Esto es más efectivo que cada 4 horas para evitar el modo "Sleep"
    - cron: '5 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping App with Cache Busting
        run: |
          URL="https://lecturas-hes.streamlit.app/"
          echo "Enviando ping a: $URL"
          
          # Added --connect-timeout and --max-time to prevent hanging
          # Removed -I (HEAD) and used GET because some CDNs block HEAD requests
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
            "$URL")
          
          echo "La aplicación respondió con el código: $STATUS"
          
          # Streamlit "Wake up" pages often return 200 but require 
          # a specific interaction. However, hitting the URL is usually enough.
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Ping enviado con éxito ($STATUS)."
          else
            echo "❌ Error: La app respondió con $STATUS"
            # We exit 0 here so the workflow doesn't show a red "X" 
            # if it's just a temporary wake-up delay.
            exit 0 
          fi
