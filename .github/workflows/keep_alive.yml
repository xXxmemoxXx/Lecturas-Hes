name: Despierta Streamlit

on:
  schedule:
    # Se ejecuta cada hora en el minuto 5
    - cron: '5 * * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          URL="https://lecturas-hes.streamlit.app/"
          
          echo "Iniciando ping a: $URL"
          
          # Cambios clave:
          # --max-redirs 5: Evita el error 47 limitando los saltos.
          # || true: Evita que el workflow falle si curl devuelve un error de salida.
          
          STATUS=$(curl -L --max-redirs 5 -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 15 \
            --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
            "$URL") || echo "Exited with error"
          
          echo "La aplicación respondió con el código: $STATUS"
          
          # Si el código es 200, 301, 302 o incluso si curl falló por redirecciones (000),
          # el intento de "despertar" ya se hizo.
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Conexión establecida con éxito ($STATUS)."
          else
            echo "⚠️ La app respondió con $STATUS o hubo demasiadas redirecciones."
            echo "Esto suele ser suficiente para que el servidor de Streamlit inicie el despertar."
            # Forzamos éxito para que no veas la X roja en GitHub
            exit 0
          fi
