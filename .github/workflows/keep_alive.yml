name: Despertar Real Lecturas HES

on:
  schedule:
    # Se ejecuta cada 20 minutos para mayor seguridad
    - cron: '*/20 * * * *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  wake-up:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Evita que el job consuma minutos de más si se queda colgado

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium
        run: |
          npm install -g playwright
          npx playwright install chromium --with-deps

      - name: Navegar a la App (Simulación Real)
        run: |
          npx playwright wk https://lecturas-hes.streamlit.app/
          
      - name: Confirmación de Actividad
        run: echo "La aplicación Lecturas HES ha sido visitada con un navegador real."
